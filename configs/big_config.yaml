# Transformer Big Model Configuration
# =====================================
# Based on "Attention Is All You Need" (Vaswani et al., 2017)

model_size: big

# Model Architecture
d_model: 1024             # 模型维度
n_heads: 16               # 注意力头数
d_ff: 4096                # 前馈网络隐藏层维度
n_encoder_layers: 6       # 编码器层数
n_decoder_layers: 6       # 解码器层数
dropout: 0.3              # Dropout 概率（Big 模型 dropout 更大）

# Vocabulary
src_vocab_size: 37000     # 源语言词汇表大小
tgt_vocab_size: 37000     # 目标语言词汇表大小
max_len: 5000             # 最大序列长度

# Training
epochs: 100               # 训练轮数
batch_size: 32            # 批次大小（token 数量约 35000）
warmup_steps: 4000        # 学习率 warmup 步数
max_grad_norm: 1.0        # 梯度裁剪阈值
label_smoothing: 0.1      # 标签平滑系数

# Optimizer (Adam)
beta1: 0.9
beta2: 0.98
eps: 1e-9

# Data
train_max_len: 100
val_max_len: 150

# Checkpointing
save_interval: 1
keep_last_n: 3           # Big 模型占用空间大，保留更少检查点

# Mixed Precision
fp16: true               # Big 模型建议使用混合精度

# Expected Performance (WMT14 En-De)
# Reported BLEU: 28.4
# This config target: >= 27.5

# Hardware Requirements
# Recommended: 8x V100 32GB or 8x A100 40GB
# Training time: ~30 hours on 8x V100
